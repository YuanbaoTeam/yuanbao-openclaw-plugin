name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: pnpm/action-setup@v4

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: pnpm/action-setup@v4

      - run: pnpm install --frozen-lockfile

      - run: pnpm test

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/build-and-pack

      - name: Archive package
        run: |
          tar -czf dist/package.tgz -C staging --owner=0 --group=0 package
          echo "✅ Pack succeeded: $(du -h dist/package.tgz | cut -f1)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: dist/package.tgz
          retention-days: 7
