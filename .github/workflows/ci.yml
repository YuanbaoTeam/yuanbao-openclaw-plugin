name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: pnpm/action-setup@v4

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the PR base (origin/main) is available for diff-coverage.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: pnpm/action-setup@v4

      - run: pnpm install --frozen-lockfile

      # Global coverage gate (whole project, thresholds in .c8rc.json) + produces lcov.
      - run: pnpm test:coverage

      # Inbound pipeline eval (JSON-fixture-driven snapshot tests)
      - run: pnpm test:eval:inbound

      # Changed-lines gate (authoritative): new/modified code on this PR must be tested.
      - name: Changed-lines coverage
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}":"refs/remotes/origin/${{ github.base_ref }}" || git fetch origin main
          node scripts/diff-coverage.mjs --base "origin/${{ github.base_ref }}" --min 80

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/build-and-pack

      - name: Archive package
        run: |
          tar -czf dist/package.tgz -C staging --owner=0 --group=0 package
          echo "✅ Pack succeeded: $(du -h dist/package.tgz | cut -f1)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: dist/package.tgz
          retention-days: 7
