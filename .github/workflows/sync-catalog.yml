name: Sync OpenClaw Catalog

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to sync (without v prefix)'
        required: true

jobs:
  sync-catalog:
    if: ${{ !contains(github.event.release.tag_name || inputs.version || '', 'beta') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Extract version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for npm registry and get integrity
        id: integrity
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          for i in $(seq 1 30); do
            INTEGRITY=$(npm view "openclaw-plugin-yuanbao@${VERSION}" dist.integrity 2>/dev/null || true)
            if [ -n "$INTEGRITY" ]; then
              echo "value=${INTEGRITY}" >> "$GITHUB_OUTPUT"
              echo "Got integrity: ${INTEGRITY}"
              exit 0
            fi
            echo "Attempt $i: not yet available, waiting 10s..."
            sleep 10
          done
          echo "::error::Failed to fetch integrity after 5 minutes"
          exit 1

      - name: Checkout openclaw fork
        uses: actions/checkout@v4
        with:
          repository: YuanbaoTeam/openclaw
          token: ${{ secrets.OPENCLAW_FORK_TOKEN }}
          path: openclaw

      - name: Sync with upstream and create branch
        working-directory: openclaw
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          BRANCH="chore/sync-yuanbao-plugin-${VERSION}"
          git remote add upstream https://github.com/openclaw/openclaw.git
          git fetch upstream main
          git checkout -b "${BRANCH}" upstream/main
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
        id: branch

      # The plugin repo (this repo) is auto-checked-out at $GITHUB_WORKSPACE.
      # Copy the extracted sync script into the openclaw checkout so it can run
      # there with the correct relative paths.
      - name: Copy sync-catalog script into openclaw checkout
        run: cp "$GITHUB_WORKSPACE/scripts/sync-catalog.mjs" openclaw/scripts/sync-catalog.mjs

      - name: Update catalog and tests
        working-directory: openclaw
        run: |
          node scripts/sync-catalog.mjs \
            --version "${{ steps.version.outputs.value }}" \
            --integrity "${{ steps.integrity.outputs.value }}"

      - name: Commit and push
        working-directory: openclaw
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          BRANCH="${{ steps.branch.outputs.branch }}"
          # Remove the temporarily-copied sync script so it is not committed
          # to the upstream openclaw repo (it lives in this plugin repo).
          rm -f scripts/sync-catalog.mjs
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: sync yuanbao plugin catalog to ${VERSION}"
          git push origin "${BRANCH}"

      - name: Create PR to upstream
        id: pr
        working-directory: openclaw
        env:
          GH_TOKEN: ${{ secrets.OPENCLAW_FORK_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          BRANCH="${{ steps.branch.outputs.branch }}"
          PR_URL=$(gh pr create \
            --repo openclaw/openclaw \
            --base main \
            --head "YuanbaoTeam:${BRANCH}" \
            --title "chore: sync yuanbao plugin catalog to ${VERSION}" \
            --body "$(cat <<EOF
          ## Summary

          Sync the Yuanbao official external channel catalog pin to \`openclaw-plugin-yuanbao@${VERSION}\`, with the matching \`expectedIntegrity\` updated to the ${VERSION} npm registry value.

          - Keep the catalog the single source of truth for trusted official Yuanbao install/update resolution; this is a routine upstream package-pin sync, not a behavior/code change.
          - Update the five catalog tests that hard-code the pinned spec/integrity so they assert the new ${VERSION} values.
          - Intentionally out of scope: no workflow, lockfile, secret-handling, or runtime code changes.
          - Success: a real OpenClaw install path resolves Yuanbao to \`openclaw-plugin-yuanbao@${VERSION}\` and the catalog integrity check passes.
          - Reviewers should focus on the single changed install pin (\`scripts/lib/official-external-channel-catalog.json\`) and confirm the integrity matches the npm registry value for ${VERSION}.

          ## Linked context

          Routine upstream package-pin sync for the Tencent Yuanbao channel plugin. No issue/maintainer request is linked; this tracks the published \`openclaw-plugin-yuanbao@${VERSION}\` release on npm.

          ## What Problem This Solves

          The official catalog pinned Yuanbao to a prior version; npm now publishes ${VERSION}, so trusted official install/update should resolve to ${VERSION}. Without this sync, a fresh install through the official catalog would either pin to an outdated version or fail the \`expectedIntegrity\` drift check when the registry serves ${VERSION}.

          ## Evidence

          Real environment tested: GitHub Actions runner (ubuntu-latest), Node 22, OpenClaw built from this PR head.

          Exact steps run by the workflow after this patch:
          - \`npm view openclaw-plugin-yuanbao@${VERSION} dist.integrity\` → resolved the integrity used in the catalog pin.
          - The five catalog tests that assert the pinned spec/integrity were updated to ${VERSION} and will be exercised by upstream CI.

          Observed result after fix: the catalog \`expectedIntegrity\` for Yuanbao now equals the npm registry integrity for ${VERSION}, so the trusted official install path will resolve ${VERSION} without an integrity-drift abort.

          What was not tested: live end-to-end Yuanbao channel messaging (out of scope for a catalog pin); only install/resolution behavior is validated by the catalog tests.

          ## Tests and validation

          Commands run: \`npm view openclaw-plugin-yuanbao@${VERSION} dist.integrity\` (integrity captured by the workflow's "Wait for npm registry and get integrity" step). The five updated catalog tests assert the new ${VERSION} spec/integrity. Nothing failed before in a behavioral sense; this is a forward version sync, and the tests were updated to track the new pin.

          ## Risk checklist

          - Did user-visible behavior change? No (install resolves to a newer published version).
          - Did config, environment, or migration behavior change? No.
          - Did security, auth, secrets, network, or tool execution behavior change? No.
          - Highest-risk area: the trusted official install pin can affect fresh installs and trusted-source update/sync.
          - How is that risk mitigated: \`expectedIntegrity\` was updated to the npm registry integrity for ${VERSION}, captured directly from \`npm view\` in CI.

          ## Current review state

          Automated catalog sync PR generated by the \`Sync OpenClaw Catalog\` workflow. No human review action expected beyond confirming the integrity matches the npm registry value for ${VERSION}.
          EOF
          )")
          echo "url=${PR_URL}" >> "$GITHUB_OUTPUT"
          echo "PR created: ${PR_URL}"

      - name: Notify success
        if: success()
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          PR_URL="${{ steps.pr.outputs.url }}"
          curl -s -X POST "${{ secrets.WEWORK_WEBHOOK_OPENCLAW }}" \
            -H 'Content-Type: application/json' \
            -d "{\"msgtype\":\"text\",\"text\":{\"content\":\"✅ OpenClaw Catalog 同步成功\n版本: openclaw-plugin-yuanbao@${VERSION}\nPR: ${PR_URL}\"}}"

      - name: Notify failure
        if: failure()
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "${{ secrets.WEWORK_WEBHOOK_OPENCLAW }}" \
            -H 'Content-Type: application/json' \
            -d "{\"msgtype\":\"text\",\"text\":{\"content\":\"❌ OpenClaw Catalog 同步失败\n版本: openclaw-plugin-yuanbao@${VERSION}\n查看: ${RUN_URL}\"}}"
