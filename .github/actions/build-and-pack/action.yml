name: Build and Pack
description: Build the project and create a clean staging package

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: 24
        registry-url: 'https://registry.npmjs.org/'

    - uses: pnpm/action-setup@v4

    - run: pnpm install --frozen-lockfile
      shell: bash

    - run: pnpm build
      shell: bash

    - name: Pack
      shell: bash
      run: |
        test -d dist || { echo "❌ dist not generated"; exit 1; }
        test -f openclaw.plugin.json || { echo "❌ openclaw.plugin.json missing"; exit 1; }

        mkdir -p staging/package
        cp -r dist/ staging/package/dist
        cp openclaw.plugin.json staging/package/
        cp package.json staging/package/

        # 清理打包产物中不需要的字段
        node -e "
          const fs = require('fs');
          const p = 'staging/package/package.json';
          const pkg = JSON.parse(fs.readFileSync(p, 'utf8'));
          delete pkg.private;
          delete pkg.devDependencies;
          fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');
        "

        # Isolate from upstream .npmrc during lockfile generation
        touch staging/package/.npmrc

        # Generate lockfile for reproducible installs
        (cd staging/package && npm install --package-lock-only --omit=dev --ignore-scripts --silent)

        # Remove the empty .npmrc so it doesn't interfere with publish
        rm -f staging/package/.npmrc
